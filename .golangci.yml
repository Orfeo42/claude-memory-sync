version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - depguard
    - dupword
    - durationcheck
    - err113
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - godot
    - goprintffuncname
    - gosec
    - inamedparam
    - interfacebloat
    - intrange
    - loggercheck
    - makezero
    - mirror
    - misspell
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - testableexamples
    - testifylint
    - thelper
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
  settings:
    cyclop:
      max-complexity: 10
    exhaustive:
      default-signifies-exhaustive: true
    depguard:
      rules:
        main:
          deny:
            - pkg: "log$"
              desc: use log/slog
            - pkg: "github.com/pkg/errors"
              desc: use stdlib errors
    forbidigo:
      forbid:
        - pattern: ^fmt\.Print.*$
          msg: no fmt printing in application code, use log/slog
        - pattern: ^print(ln)?$
    funlen:
      lines: 60
      statements: 40
    gocognit:
      min-complexity: 15
    nakedret:
      max-func-lines: 0
    nestif:
      min-complexity: 4
    sloglint:
      no-mixed-args: true
      context: scope
      static-msg: true
      key-naming-case: snake
    revive:
      rules:
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: receiver-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: unused-parameter
        - name: early-return
        - name: max-public-structs
          disabled: true
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - funlen
          - gocognit
          - cyclop
          - err113
          - gosec
          - noctx
          - gochecknoglobals
          - goconst
      - path: cmd/
        linters:
          - forbidigo
      - path: internal/store/git\.go
        text: "G204"
        linters:
          - gosec

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      module-path: claude-memory-sync
    goimports:
      local-prefixes:
        - claude-memory-sync
